<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#128C7E" />
  <meta name="description" content="Короткий опрос ролей в команде — удобно открыть из WhatsApp и поделиться результатом" />
  <title>Роли в команде — короткий тест</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Роли в команде</h1>
      <p class="subtitle">Короткий опрос по модели, близкой к Бельбину. Для официального теста Belbin нужна лицензия belbin.com.</p>
    </header>

    <main id="screen-intro" class="screen active">
      <p class="lead">18 утверждений, ~2 минуты. Результат можно сразу отправить в группу WhatsApp.</p>
      <button type="button" class="btn btn-primary" id="btn-start">Начать</button>
    </main>

    <main id="screen-quiz" class="screen" hidden>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
        <span class="progress-text" id="progress-text">1 / 18</span>
      </div>
      <p class="question" id="question-text"></p>
      <div class="scale" id="scale" role="group" aria-label="Шкала согласия"></div>
      <div class="nav-row">
        <button type="button" class="btn btn-ghost" id="btn-back" disabled>Назад</button>
      </div>
    </main>

    <main id="screen-result" class="screen" hidden>
      <h2>Ваш профиль</h2>
      <p class="result-hint">Топ-роли — те, где вы сильнее всего проявляетесь в команде.</p>
      <ul class="result-list" id="result-list"></ul>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="btn-share-wa">Поделиться в WhatsApp</button>
        <button type="button" class="btn btn-secondary" id="btn-copy">Скопировать текст</button>
        <button type="button" class="btn btn-ghost" id="btn-retry">Пройти снова</button>
      </div>
    </main>

    <footer class="footer">
      <span id="toast" class="toast" hidden></span>
    </footer>
  </div>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
